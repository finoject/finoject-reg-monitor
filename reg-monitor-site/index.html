<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>金融規制ウォッチ｜5機関 新着モニター</title>
<style>
  :root{ --bg:#0b1220; --card:#121b2e; --line:#26334d; --fg:#e8eefb; --muted:#8da3c6; --accent:#2e6cf0; }
  *{ box-sizing:border-box; }
  body{ margin:0; background:var(--bg); color:var(--fg);
    font-family:"Segoe UI","Hiragino Sans","Meiryo",sans-serif; -webkit-text-size-adjust:100%; }
  #portal{ background:#0e1626; border-bottom:1px solid var(--line); padding:8px 18px; font-size:13px; }
  #portal .wrap{ display:flex; gap:16px; align-items:center; }
  #portal .pcur{ color:#fff; font-weight:700; }
  #portal a{ color:#9fb4d6; text-decoration:none; }
  #portal a:hover{ color:#7fb0ff; text-decoration:underline; }
  .ref{ flex:none; display:inline-block; font-size:11px; margin-top:2px; padding:2px 8px; border-radius:6px;
    background:#13243f; color:#8fd0ff; border:1px solid #2b66c0; text-decoration:none; white-space:nowrap; }
  .ref:hover{ background:#1c3a63; color:#cfe7ff; }
  .itembody{ flex:1; min-width:0; }
  .refs{ display:flex; flex-wrap:wrap; gap:6px; margin-top:6px; }
  .ref .acount{ margin-left:5px; font-size:10px; font-weight:700; color:#a9d4ff; }
  .ref .kind{ margin-left:6px; font-size:10px; font-weight:700; padding:0 5px; border-radius:4px; background:#2b66c0; color:#eaf3ff; }
  .ref .k-パブコメ{ background:#b45309; color:#fff; }
  .ref .k-改正{ background:#1d4ed8; color:#fff; }
  .ref .k-公布{ background:#15803d; color:#fff; }
  .ref .k-ガイドライン{ background:#7c3aed; color:#fff; }
  .ref .k-告示, .ref .k-通達等{ background:#475569; color:#fff; }
  /* portal＋header をまとめて画面上部に固定（スクロールしても法令ビューアリンク・フィルタが消えない）*/
  .topbar{ position:sticky; top:0; z-index:10; }
  header{ background:rgba(11,18,32,0.95); backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line); padding:14px 18px; }
  .wrap{ max-width:880px; margin:0 auto; }
  h1{ font-size:18px; margin:0 0 2px; }
  .meta{ font-size:12px; color:var(--muted); }
  .controls{ display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; align-items:center; }
  .chip{ font-size:12px; padding:6px 11px; border-radius:16px; cursor:pointer; user-select:none;
    background:#16223a; color:#cfe0ff; border:1px solid var(--line); }
  .chip.on{ background:var(--accent); border-color:var(--accent); color:#fff; }
  .chip-law{ border-color:#2b66c0; color:#8fd0ff; }
  .chip-law.on{ background:#1d4ed8; border-color:#1d4ed8; color:#fff; }
  #q{ flex:1; min-width:140px; padding:8px 11px; border-radius:8px; border:1px solid var(--line);
    background:#0e1626; color:var(--fg); font-size:13px; }

  main{ padding:8px 18px 60px; }
  .day{ margin:18px 0 6px; font-size:13px; font-weight:700; color:#bcd0f0;
    border-left:3px solid var(--accent); padding-left:9px; }
  .item{ display:flex; gap:10px; align-items:flex-start; padding:11px 8px; border-bottom:1px solid var(--line); }
  .badge{ flex:none; font-size:11px; font-weight:600; color:#fff; padding:3px 8px; border-radius:6px; white-space:nowrap; margin-top:1px; }
  .item a{ color:var(--fg); text-decoration:none; font-size:14px; line-height:1.5; }
  .item a:hover{ color:#7fb0ff; text-decoration:underline; }
  .new{ flex:none; font-size:10px; font-weight:700; color:#0b1220; background:#fbbf24; border-radius:4px; padding:1px 5px; margin-top:3px; }
  .empty{ color:var(--muted); text-align:center; padding:40px 0; }
  footer{ border-top:1px solid var(--line); padding:14px 18px; color:var(--muted); font-size:11px; }
  footer a{ color:#7fb0ff; }
  @media(max-width:600px){ .item a{ font-size:13.5px; } h1{ font-size:16px; } }
</style>
</head>
<body>
<div class="topbar">
<nav id="portal"><div class="wrap">
  <span class="pcur">📡 finoject金融規制ウォッチ</span>
  <a href="https://finoject.github.io/finoject-law-viewer/" target="_blank" rel="noopener">⚖️ 金融関連法令ビューア ↗</a>
</div></nav>
<header><div class="wrap">
  <h1>📡 finoject金融規制ウォッチ</h1>
  <div class="meta" id="meta">読み込み中…</div>
  <div class="controls">
    <span class="chip on" data-ag="all">すべて</span>
    <span class="chip" data-ag="金融庁">金融庁</span>
    <span class="chip" data-ag="日本銀行">日本銀行</span>
    <span class="chip" data-ag="日本取引所グループ">JPX</span>
    <span class="chip" data-ag="日本証券業協会">日証協</span>
    <span class="chip" data-ag="JVCEA">JVCEA</span>
    <span class="chip" data-ag="日本公認会計士協会">日本公認会計士協会</span>
    <span class="chip chip-law" data-ag="__lawlinked__">📖 法令リンクあり</span>
    <input id="q" placeholder="キーワード検索…">
  </div>
</div></header>
</div>

<main class="wrap" id="list"><div class="empty">読み込み中…</div></main>

<footer class="wrap" id="footer"></footer>

<script>
const COLORS = {
  '金融庁':'#2e6cf0', '日本銀行':'#16a34a', '日本取引所グループ':'#0d9488',
  '日本証券業協会':'#d97706', 'JVCEA':'#9333ea', '日本公認会計士協会':'#dc2626'
};
const AGENCY_ORDER = { '金融庁':1, '日本銀行':2, '日本取引所グループ':3, '日本証券業協会':4, 'JVCEA':5, '日本公認会計士協会':6 };
const SHORT = { '日本取引所グループ':'JPX' };  // バッジの表示短縮（データ上の名称は維持）
let DATA = { items:[], generatedAt:null, sources:[] };
let filterAg = 'all', keyword = '';

// ===== 法令ビューアへの動線：タイトルから法令名＋条番号を検出してディープリンク =====
const LAW_BASE = 'https://finoject.github.io/finoject-law-viewer/';
// 具体的な府令・施行令を先に（「資金決済に関する法律施行令」を本法より優先）
const LAWREFS = [
  { id:'429M60000002007', short:'暗号資産交換業者府令', kw:['暗号資産交換業者に関する内閣府令'] },
  { id:'422M60000002004', short:'資金移動業者府令',     kw:['資金移動業者に関する内閣府令'] },
  { id:'422M60000002003', short:'前払式支払手段府令',   kw:['前払式支払手段に関する内閣府令'] },
  { id:'505M60000002048', short:'電子決済手段等府令',   kw:['電子決済手段等取引業者に関する内閣府令'] },
  { id:'419M60000002052', short:'金商業等府令',         kw:['金融商品取引業等に関する内閣府令'] },
  { id:'422CO0000000019', short:'資金決済法施行令',     kw:['資金決済に関する法律施行令'] },
  { id:'420CO0000000020', short:'犯収法施行令',         kw:['犯罪による収益の移転防止に関する法律施行令'] },
  { id:'420M60000F5A001', short:'犯収法施行規則',       kw:['犯罪による収益の移転防止に関する法律施行規則'] },
  { id:'340CO0000000321', short:'金商法施行令',         kw:['金融商品取引法施行令'] },
  { id:'421AC0000000059', short:'資金決済法',           kw:['資金決済に関する法律','資金決済法'] },
  { id:'419AC0000000022', short:'犯収法',               kw:['犯罪による収益の移転防止に関する法律','犯罪収益移転防止法','犯収法'] },
  { id:'323AC0000000025', short:'金商法',               kw:['金融商品取引法','金商法'] },
];
const KNUM = {'〇':0,'零':0,'一':1,'二':2,'三':3,'四':4,'五':5,'六':6,'七':7,'八':8,'九':9}, KS={'十':10,'百':100,'千':1000};
function k2n(s){
  if(/^[0-9０-９]+$/.test(s)) return s.replace(/[０-９]/g,d=>String.fromCharCode(d.charCodeAt(0)-0xFEE0));
  let tot=0,cur=0; for(const ch of s){ if(ch in KNUM)cur=KNUM[ch]; else if(ch in KS){tot+=(cur||1)*KS[ch];cur=0;} } return String(tot+cur);
}
function detectLawLink(title){
  const law = LAWREFS.find(L => L.kw.some(k => title.includes(k)));
  if(!law) return null;
  // 条番号（第○条、第○条の○）を抽出 → ビューアの表示形式に合わせる
  const m = title.match(/第([〇一二三四五六七八九十百千0-9０-９]+)条(?:の([〇一二三四五六七八九十0-9０-９]+))?/);
  let art = '', label = law.short;
  if(m){ art = '第'+k2n(m[1])+'条'+(m[2]?'の'+k2n(m[2]):''); label += ' '+art; }
  const url = LAW_BASE + '?law=' + law.id + (art ? '&art='+encodeURIComponent(art) : '');
  return { url, label };
}

function jpDate(iso){ const [y,m,d]=iso.split('-'); return `${y}年${+m}月${+d}日`; }
function jstStr(iso){ if(!iso) return '—'; const d=new Date(iso); const j=new Date(d.getTime()+9*3600000);
  const p=n=>String(n).padStart(2,'0');
  return `${j.getUTCFullYear()}/${p(j.getUTCMonth()+1)}/${p(j.getUTCDate())} ${p(j.getUTCHours())}:${p(j.getUTCMinutes())}`; }

function render(){
  const latest = DATA.generatedAt;
  let items = DATA.items.filter(it =>
    (filterAg==='all' || (filterAg==='__lawlinked__' ? hasLawLink(it) : it.agency===filterAg)) &&
    (!keyword || (it.title||'').toLowerCase().includes(keyword) || (it.agency||'').includes(keyword))
  );
  // 日付降順（新しい順）。同じ日付内は指定の機関順で並べる。
  items.sort((a,b)=> (b.date||'').localeCompare(a.date||'')
    || (AGENCY_ORDER[a.agency]||9)-(AGENCY_ORDER[b.agency]||9));
  const list = document.getElementById('list');
  if(!items.length){ list.innerHTML = '<div class="empty">該当する項目がありません</div>'; return; }

  let html='', curDate=null;
  for(const it of items){
    if(it.date!==curDate){ curDate=it.date; html += `<div class="day">${jpDate(it.date)}</div>`; }
    const c = COLORS[it.agency] || '#64748b';
    const isNew = it.detectedAt && it.detectedAt===latest;
    html += `<div class="item">
      <span class="badge" style="background:${c}">${SHORT[it.agency]||it.agency}</span>
      <div class="itembody">
        <a href="${it.url}" target="_blank" rel="noopener noreferrer">${escapeHtml(it.title)}</a>
        ${isNew?'<span class="new">NEW</span>':''}
        ${filterAg==='__lawlinked__' ? refsHtml(it) : ''}
      </div>
    </div>`;
  }
  list.innerHTML = html;
}
function escapeHtml(s){ return (s||'').replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
// 法令ビューアへのリンク（📖チップ）を持つ項目か
function hasLawLink(it){ return !!((it.lawrefs && it.lawrefs.length) || detectLawLink(it.title||'')); }

// 📖チップ：クローラが算出した lawrefs（参照法令＋条＋種別）から描画。未処理itemは従来のタイトル解析でフォールバック。
function refsHtml(it){
  let refs = (it.lawrefs && it.lawrefs.length) ? it.lawrefs : null;
  if(!refs){ const r = detectLawLink(it.title||''); if(!r) return ''; refs = [{ id:null, url:r.url, label:r.label, art:null, kind:null }]; }
  // 1ニュースが多数の条にまたがる→法令単位に集約（条別の詳細は法令ビューアのパネルが担当）。リンクは最初の該当条へ。
  const byLaw = new Map();
  for(const r of refs){
    const key = r.id || r.label;
    if(!byLaw.has(key)) byLaw.set(key, { id:r.id, url:r.url, label:(r.label||'').replace(/\s*第.+$/,''), art:r.art, kind:r.kind, arts:new Set() });
    const g = byLaw.get(key); if(r.art){ g.arts.add(r.art); if(!g.art) g.art=r.art; }
  }
  const chips = [...byLaw.values()].slice(0,5).map(g=>{
    const url = g.url || (LAW_BASE + '?law=' + g.id + (g.art ? '&art='+encodeURIComponent(g.art) : ''));
    const kb = g.kind && g.kind!=='その他' ? `<span class="kind k-${g.kind}">${g.kind}</span>` : '';
    const ac = g.arts.size ? `<span class="acount">${g.arts.size}条</span>` : '';
    return `<a class="ref" href="${url}" target="_blank" rel="noopener" title="法令ビューアで開く（該当 ${g.arts.size||0} 条）">📖 ${escapeHtml(g.label)}${ac}${kb}</a>`;
  });
  return `<div class="refs">${chips.join('')}</div>`;
}

function setMeta(){
  document.getElementById('meta').textContent =
    `監視対象6機関 ／ 最終更新: ${jstStr(DATA.generatedAt)}（JST） ／ 全${DATA.items.length}件`;
  document.getElementById('footer').innerHTML =
    '出典（各機関の公開情報）: ' + (DATA.sources||[]).map(s=>`<a href="${s.url}" target="_blank" rel="noopener">${s.name}</a>`).join(' ・ ') +
    '<br>毎朝の自動巡回で新着を追記します。NEWは最新巡回で検知した項目。';
}

document.querySelectorAll('.chip').forEach(ch=>ch.addEventListener('click',()=>{
  const ag = ch.dataset.ag;
  // 同じチップを再クリックしたら解除して「すべて」に戻す（特に「法令リンクあり」をオン/オフでトグル）
  filterAg = (filterAg === ag && ag !== 'all') ? 'all' : ag;
  document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('on', c.dataset.ag === filterAg));
  render();
}));
document.getElementById('q').addEventListener('input', e=>{ keyword=e.target.value.trim().toLowerCase(); render(); });

fetch('./data.json?t=' + Date.now())
  .then(r=>r.json())
  .then(d=>{ DATA=d; setMeta(); render(); })
  .catch(e=>{ document.getElementById('list').innerHTML='<div class="empty">データを読み込めませんでした</div>'; });
</script>
</body>
</html>
