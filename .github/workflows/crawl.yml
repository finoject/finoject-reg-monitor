name: crawl-and-publish

on:
  schedule:
    # 日中に約2時間おきで巡回（UTC指定）。JST = UTC+9。
    # 分は :00 を避ける（GitHubは毎時0分が最も混雑し schedule がドロップされやすい＝公式注意。:41 で回避）。
    # 取りこぼしに強くするため回数も増やす（一部スキップされても他の枠で更新される）。
    - cron: '41 21,23,1,3,5,7,9,11 * * *'   # JST 06:41/08:41/10:41/12:41/14:41/16:41/18:41/20:41
  workflow_dispatch:          # 手動実行も可能

permissions:
  contents: write   # data.json をリポジトリに追記コミットするため
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: PDF抽出ツール（法令連携の本文解析用）
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: 依存インストール
        working-directory: reg-monitor
        run: npm install

      - name: 巡回（6機関の新着を取得し data.json を更新／新規分をSlackへ）
        working-directory: reg-monitor
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: node crawler.js

      - name: 差分データをコミット（蓄積を永続化）
        run: |
          git config user.name "reg-monitor-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reg-monitor-site/data.json
          git commit -m "chore: update data.json ($(date -u +%FT%TZ))" || echo "変更なし"
          git push || echo "push対象なし"

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: reg-monitor-site
      - id: deployment
        uses: actions/deploy-pages@v4
