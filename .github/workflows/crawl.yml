name: crawl-and-publish

on:
  schedule:
    # 毎時:37に巡回（1日24回）。法令ビューアの「関連ニュース」はこの data.json を直読みするため、
    # ニュースを常時最新に保つには高頻度が要る（三根さん指示2026-06-17）。
    # 分は :00 を避ける（GitHubは毎時0分が最も混雑し schedule がドロップ/遅延しやすい＝公式注意。:37で回避）。
    - cron: '37 * * * *'   # 毎時37分 = JST 毎時37分（1日24回）
  workflow_dispatch:          # 手動実行も可能

permissions:
  contents: write   # data.json をリポジトリに追記コミットするため
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: PDF抽出ツール（法令連携の本文解析用）
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: 依存インストール
        working-directory: reg-monitor
        run: npm install

      - name: 巡回（6機関の新着を取得し data.json を更新／新規分をSlackへ）
        working-directory: reg-monitor
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: node crawler.js

      - name: 差分データをコミット（蓄積を永続化）
        run: |
          git config user.name "reg-monitor-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reg-monitor-site/data.json
          git commit -m "chore: update data.json ($(date -u +%FT%TZ))" || echo "変更なし"
          git push || echo "push対象なし"

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: reg-monitor-site
      - id: deployment
        uses: actions/deploy-pages@v4
